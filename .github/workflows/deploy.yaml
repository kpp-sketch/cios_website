name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install pandas openpyxl

      # Ensuring the script runs correctly by checking for its existence first
      - name: Run Sync Script
        run: |
          if [ -f scripts/sync_data.py ]; then
            python scripts/sync_data.py
          elif [ -f sync_data.py ]; then
            python sync_data.py
          else
            echo "Error: sync_data.py not found in root or scripts/ folder."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install JS Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
